# application.yml

amap:
  key: "dc498633b662571e956a5d8ab59bceea"  # ← 替换为你自己的 Key

poi:
  crawler:
    auto-run: true        # 开启自动爬取以触发多城市初始化
    keywords: "仓库|物流园|工厂" # 扩展关键词
    city: "北京" # 默认值，会被代码覆盖
    max-pages: 2


server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/zongshe
    username: root
    password: abc123
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: zongshe1
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: info